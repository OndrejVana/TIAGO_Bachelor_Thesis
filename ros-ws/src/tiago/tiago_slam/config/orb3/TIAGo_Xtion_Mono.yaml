%YAML:1.0
File.version: "1.0"

# -------- Camera (Monocular) --------
Camera.type: "PinHole"

# Intrinsics from /xtion/rgb/camera_info (K matrix)
Camera1.fx: 522.1910329546544
Camera1.fy: 522.1910329546544
Camera1.cx: 320.5
Camera1.cy: 240.5

# Distortion (use zeros for image_rect / rectified)
Camera1.k1: 0.0
Camera1.k2: 0.0
Camera1.p1: 0.0
Camera1.p2: 0.0
Camera1.k3: 0.0

Camera.width: 640
Camera.height: 480
Camera.fps: 30

# 0=BGR, 1=RGB (ignored for mono but parser may require it)
Camera.RGB: 0

# -------- ORB Extractor --------
ORBextractor.nFeatures: 2500
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 10
ORBextractor.minThFAST: 3

# -------- Viewer (Pangolin) --------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
